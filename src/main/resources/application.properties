spring.application.name=blofin-trade
spring.profiles.active=${SPRING_PROFILE:default}
server.port=8888

# BloFin API
blofin.api.key=${BLOFIN_API_KEY:}
blofin.api.secret=${BLOFIN_API_SECRET:}
blofin.api.passphrase=${BLOFIN_API_PASSPHRASE:}
usd-amount-for-trade=${USD_AMOUNT_FOR_TRADE:20.0}

logging.level.com.mulaczos.blofin_trade.service=INFO

# Format logowania
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSSXXX} [%level] %logger{36} : %msg%n

# Persystentne logi do pliku
logging.file.path=/logs
logging.file.name=/logs/blofin-trade.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# Dzielnik dla retracementu w strategii scalp
retracement.divider=${RETRACEMENT_DIVIDER:2}

# Konfiguracja Twilio dla powiadomie? SMS
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.recipient.phone=${TWILIO_RECIPIENT_PHONE:}

twilio.notifications.enabled=${TWILIO_NOTIFICATIONS_ENABLED:false}

spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:bybit_trade}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Konfiguracja inicjalizacji skryptów SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:ddl/create_limit_orders_tables.sql
spring.sql.init.continue-on-error=true

limit-order.tracker.check-interval=60000
