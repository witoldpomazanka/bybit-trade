# Podstawowa konfiguracja dla Dockera
spring.application.name=bybit-trade

# Aktywny profil
spring.profiles.active=${SPRING_PROFILE:default}

# Konfiguracja serwera
server.port=8080

# Konfiguracja bazy danych PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bybit_trade}
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Konfiguracja JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Konfiguracja API Bybit
bybit.api.key=${BYBIT_API_KEY:test_api_key}
bybit.api.secret=${BYBIT_API_SECRET:test_secret_key}
bybit.api.testnet=${BYBIT_TESTNET:false} 